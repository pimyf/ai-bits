baseURL = 'https://getaibits.com/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh-cn'
title = 'AI Bits'
theme = 'PaperMod'

# SEO 基础配置
enableRobotsTXT = true
canonifyURLs = true
rssLimit = 20

# 启用搜索
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  author = "Gavin"
  description = "AI 知识、工具、实践 —— 每一个小知识点，都可能带来大启发"
  
  # SEO 关键词
  keywords = ["AI", "人工智能", "OpenClaw", "Claude", "大模型", "AI工具", "AI编程", "Agent"]
  
  # 社交分享默认图片
  images = ["/images/og-default.png"]
  
  # 百度站长验证（需要到百度站长平台获取）
  baiduVerification = ""
  
  # 百度统计（可选）
  baiduAnalytics = ""
  
  # 微博 Card
  [params.weibo]
    card = "summary_large_image"
  
  # Twitter Card
  [params.twitter]
    card = "summary_large_image"
    site = ""
    creator = ""
  
  # Open Graph
  [params.opengraph]
    enabled = true
    site_name = "AI Bits"
    type = "website"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "auto"
  disableSpecial1stPost = false
  hidemeta = false
  comments = true
  
  # 首页模式：profile
  [params.profileMode]
    enabled = true
    title = "AI Bits"
    subtitle = "🤖 AI 知识碎片 · 工具技巧 · 实践经验"
    imageUrl = "/images/avatar.png"
    imageWidth = 140
    imageHeight = 140
    
    [[params.profileMode.buttons]]
      name = "📚 所有文章"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "🏷️ 标签"
      url = "/tags/"

  # 搜索
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  # 封面图默认设置
  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true

  # 社交图标
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/pimyf"
  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:gavin@example.com"

# 菜单
[menu]
  [[menu.main]]
    name = "🏠 首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "📚 文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "🔧 技能"
    url = "/skills.html"
    weight = 3
  [[menu.main]]
    name = "🔍 搜索"
    url = "/search/"
    weight = 4
  [[menu.main]]
    name = "🏷️ 标签"
    url = "/tags/"
    weight = 5
  [[menu.main]]
    name = "👤 关于"
    url = "/about/"
    weight = 6

# Markdown 渲染
[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
